<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="3;url=https://snowprep.vercel.app/">
  <link rel="canonical" href="https://snowprep.vercel.app/">
  <title>CSA Quiz has moved to SnowPrep</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f766e 0%, #065f46 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 480px;
    }
    h1 { font-size: 28px; margin-bottom: 12px; }
    p { font-size: 16px; opacity: 0.85; margin-bottom: 24px; line-height: 1.6; }
    .btn {
      display: inline-block;
      background: white;
      color: #0f766e;
      padding: 14px 36px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 16px;
      text-decoration: none;
      transition: transform 0.2s;
    }
    .btn:hover { transform: scale(1.05); }
    .countdown {
      margin-top: 20px;
      font-size: 13px;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>We've Moved!</h1>
    <p>CSA Quiz is now <strong>SnowPrep</strong> — same free 300+ practice questions, better experience, new features.</p>
    <a href="https://snowprep.vercel.app/" class="btn">Go to SnowPrep</a>
    <p class="countdown">Redirecting automatically in <span id="sec">3</span> seconds...</p>
  </div>
  <script>
    let s = 3;
    const el = document.getElementById('sec');
    setInterval(() => { if (s > 0) el.textContent = --s; }, 1000);
  </script>
</body>
</html>
